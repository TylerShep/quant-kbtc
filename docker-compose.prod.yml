services:
  bot:
    volumes:
      - kbtc-data:/mnt/data
    environment:
      BOT_ENV: production
      LOG_LEVEL: INFO
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --loop uvloop --workers 1
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  db:
    restart: always
