services:
  bot:
    volumes:
      - kbtc-data:/mnt/data
    environment:
      BOT_ENV: production
      LOG_LEVEL: INFO
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --loop uvloop --workers 1
    mem_limit: 1536m
    memswap_limit: 2g
    cpus: 1.5

  db:
    restart: always
    mem_limit: 768m
    memswap_limit: 1g
